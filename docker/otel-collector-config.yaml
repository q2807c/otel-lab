# OpenTelemetry Collector 基础配置
# 三条 pipeline：traces -> Jaeger，metrics -> Prometheus，logs -> Loki
# Phase 5 会在此基础上演进出 tail_sampling、transform 等版本。

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 2s
    limit_mib: 512
    spike_limit_mib: 128
  resource:
    attributes:
      - key: deployment.environment
        value: local-lab
        action: upsert

exporters:
  # Traces → Jaeger（通过 OTLP gRPC 直连 Jaeger 1.35+）
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics → Prometheus pull
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

  # Logs → Loki（通过 OTLP HTTP）
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  # 调试用：把所有数据打到 stdout
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki, debug]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
