global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # Collector 自身的运行指标
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]

  # 业务应用通过 OTLP → Collector → Prometheus exporter (8889) 暴露
  - job_name: otel-apps
    static_configs:
      - targets: ["otel-collector:8889"]
